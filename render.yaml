# Render deployment configuration
services:
  - type: web
    name: roadpulse-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && python download_models.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
    autoDeploy: true
